<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Equipe — Iniciais VOI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f2f2;font-family:'Segoe UI',Tahoma,sans-serif;color:#2C2C2C}

.header{background:#8B1A3A;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.hlogo{display:flex;align-items:center;gap:14px}
.logo-img{width:52px;height:52px;object-fit:contain;border-radius:4px}
.htitle{color:#fff;font-size:20px;font-weight:700}
.hsub{color:rgba(255,255,255,.65);font-size:12px;margin-top:3px}
.hdate{color:rgba(255,255,255,.85);font-size:12px;text-align:right;line-height:1.8}
.refresh-badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;padding:3px 10px;border-radius:20px;margin-top:4px;display:inline-block}

.content{padding:16px 20px}
.sec-title{font-size:10px;font-weight:700;color:#8B1A3A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

/* Métricas topo */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.mc{background:#fff;border-radius:8px;padding:13px 15px;border-top:3px solid #8B1A3A}
.mc.red{border-top-color:#B71C1C}.mc.orange{border-top-color:#E65100}
.mc.amber{border-top-color:#F57F17}.mc.dark{border-top-color:#3C3C3C}
.ml{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.mn{font-size:26px;font-weight:700;color:#3C3C3C;line-height:1}
.ms{font-size:10px;color:#bbb;margin-top:3px}

/* Prescrições */
.presc-card{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:16px}
.ct{font-size:10px;font-weight:700;color:#8B1A3A;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.presc-item{border-left:3px solid #B71C1C;padding:6px 10px;margin-bottom:5px;background:#fff8f8;border-radius:0 6px 6px 0;display:flex;justify-content:space-between;align-items:center}
.presc-item.warn{border-left-color:#E65100;background:#fff9f5}
.presc-item.prescrito{border-left-color:#7B1FA2;background:#fdf4ff}
.pi-nome{font-size:11px;font-weight:600}
.pi-etapa{font-size:9px;color:#aaa;margin-top:1px}
.pi-dias{font-size:12px;font-weight:700;white-space:nowrap;margin-left:8px}

/* Grid de responsáveis */
.equipe-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px}

.membro-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.membro-header{background:#8B1A3A;padding:14px 16px;display:flex;align-items:center;gap:14px}
.membro-foto{width:60px;height:60px;border-radius:50%;object-fit:cover;object-position:center top;border:3px solid rgba(255,255,255,.4);flex-shrink:0}
.membro-nome{color:#fff;font-size:15px;font-weight:700}
.membro-total{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px}

.membro-body{padding:12px 16px}

/* Fases do membro */
.fases-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fase-badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600}
.fase-confeccao{background:#E8F5E9;color:#2E7D32}
.fase-correcao{background:#FCE4EC;color:#8B1A3A}
.fase-distribuicao{background:#FFF3E0;color:#E65100}
.fase-contratacao{background:#F3E5F5;color:#6A1B9A}

/* Alertas de prescrição do membro */
.membro-alertas{margin-bottom:10px}
.alerta-presc{padding:5px 8px;border-radius:6px;font-size:10px;margin-bottom:3px;display:flex;justify-content:space-between}
.alerta-presc.critico{background:#FFEBEE;color:#B71C1C}
.alerta-presc.urgente{background:#FFF3E0;color:#E65100}
.alerta-presc.prescrito{background:#F3E5F5;color:#7B1FA2}

/* Top 5 atrasados */
.atrasados-title{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;border-top:1px solid #f0f0f0;padding-top:8px}
.atrasado-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f8f8f8}
.atrasado-item:last-child{border-bottom:none}
.atrasado-dias{font-size:11px;font-weight:700;color:#8B1A3A;white-space:nowrap;min-width:32px}
.atrasado-info{flex:1}
.atrasado-cliente{font-size:10px;font-weight:600;color:#2C2C2C;line-height:1.3}
.atrasado-etapa{font-size:9px;color:#aaa;margin-top:1px;line-height:1.3}

.erro-box{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:14px;text-align:center;color:#856404;font-size:12px;margin-top:16px}
.ts{text-align:right;font-size:9px;color:#ccc;padding:4px 20px 12px}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo">
    <img src="https://rafael-voi.github.io/voi-dashboards/Logo VOI Advogados_Prancheta 1.jpg" class="logo-img" alt="VOI">
    <div>
      <div class="htitle">VOI Advogados — Equipe de Iniciais</div>
      <div class="hsub">Visão individual da equipe · Gestora: Bruna Moura</div>
      <div class="refresh-badge" id="refresh-status">⟳ Carregando...</div>
    </div>
  </div>
  <div class="hdate" id="hdate"></div>
</div>

<div class="content" id="conteudo">
  <div style="padding:40px;text-align:center;color:#aaa;font-size:13px">Carregando dados da equipe...</div>
</div>
<div class="ts" id="ts"></div>

<script>
const BASE_URL = 'https://rafael-voi.github.io/voi-dashboards/';
const JSON_URL = BASE_URL + 'dashboard_voi_equipe_data.json';
const INTERVALO_MS = 30 * 60 * 1000;
let countdown = INTERVALO_MS / 1000;

const FOTOS = {
  'Matheus Scotti': BASE_URL + 'Matheus Scotti.jpeg',
  'Bruna Moura': BASE_URL + 'Bruna Moura.jpeg',
  'Amanda Faria': BASE_URL + 'Amanda Faria.png',
  'Maria Beatriz': BASE_URL + 'Maria Beatriz.jpeg',
  'Gislaine Cristina': BASE_URL + 'Gislaine Cristina.jpeg',
  'Laura Guimarães': BASE_URL + 'Laura.jpeg',
  'Gabriela Martinez': BASE_URL + 'Gabriela Martinez.jpeg',
};

const CORES_FASE = {
  'Confecção': 'fase-confeccao',
  'Correção': 'fase-correcao',
  'Distribuição': 'fase-distribuicao',
  'Contratação': 'fase-contratacao',
};

function dentroDoHorario() {
  const h = new Date().getHours();
  return h >= 8 && h < 19;
}

function atualizarContador() {
  if (!dentroDoHorario()) {
    document.getElementById('refresh-status').textContent = '⏸ Atualização pausada fora do horário (8h–19h)';
    return;
  }
  const m = Math.floor(countdown / 60).toString().padStart(2, '0');
  const s = (countdown % 60).toString().padStart(2, '0');
  document.getElementById('refresh-status').textContent = '⟳ Próxima atualização em ' + m + ':' + s;
  countdown--;
  if (countdown < 0) { countdown = INTERVALO_MS / 1000; carregarDados(); }
}

async function carregarDados() {
  try {
    const resp = await fetch(JSON_URL + '?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();
    renderizar(d);
  } catch(e) {
    document.getElementById('conteudo').innerHTML = `<div class="erro-box">⚠️ Não foi possível carregar os dados.<br><small>${e.message}</small></div>`;
  }
}

function renderizar(d) {
  const v = d.visao_geral;
  const p = d.prescricoes;
  const r = d.responsaveis;
  const b = d.bloqueios || [];

  document.getElementById('conteudo').innerHTML = `
  <div class="sec-title" style="margin-top:4px">Visão geral da equipe</div>
  <div class="metrics">
    <div class="mc dark"><div class="ml">Total em aberto</div><div class="mn">${v.total_processos}</div><div class="ms">processos ativos</div></div>
    <div class="mc red"><div class="ml">⚠ Prescrevem &lt;15d</div><div class="mn">${v.prescricao_critica}</div><div class="ms">urgente</div></div>
    <div class="mc orange"><div class="ml">Distribuição urgente</div><div class="mn">${v.distribuicao_urgente}</div><div class="ms">rescisão·prescrição·+5a</div></div>
    <div class="mc amber"><div class="ml">Registro +5 anos</div><div class="mn">${v.registro_mais_5_anos}</div><div class="ms">perda diária de direito</div></div>
    <div class="mc dark"><div class="ml">Bloqueios ativos</div><div class="mn">${b.reduce((s,x)=>s+x.total,0)}</div><div class="ms">4.1 e 4.2</div></div>
  </div>

  ${(p.critico_0_15.length + p.urgente_16_30.length) > 0 ? `
  <div class="sec-title">Prescrições — Ação imediata</div>
  <div class="presc-card">
    ${p.critico_0_15.length > 0 ? `<div style="font-size:9px;font-weight:700;color:#B71C1C;text-transform:uppercase;margin-bottom:6px">🔴 Crítico — menos de 15 dias</div>` : ''}
    ${p.critico_0_15.map(x => `
      <div class="presc-item">
        <div><div class="pi-nome">${x.cliente}</div><div class="pi-etapa">${x.responsavel} · ${x.etapa}</div></div>
        <div class="pi-dias" style="color:#B71C1C">🔴 ${x.dias === 0 ? 'HOJE' : x.dias + 'd'}</div>
      </div>`).join('')}
    ${p.urgente_16_30.length > 0 ? `<div style="font-size:9px;font-weight:700;color:#E65100;text-transform:uppercase;margin:8px 0 6px">⚠️ 16 a 30 dias</div>` : ''}
    ${p.urgente_16_30.map(x => `
      <div class="presc-item warn">
        <div><div class="pi-nome">${x.cliente}</div><div class="pi-etapa">${x.responsavel} · ${x.etapa}</div></div>
        <div class="pi-dias" style="color:#E65100">⚠️ ${x.dias}d</div>
      </div>`).join('')}
  </div>` : ''}

  <div class="sec-title">Por membro da equipe</div>
  <div class="equipe-grid">
    ${r.map(resp => {
      const foto = FOTOS[resp.nome] || '';
      const fases = Object.entries(resp.composicao).map(([tipo, n]) =>
        `<span class="fase-badge ${CORES_FASE[tipo]||''}">${tipo}: ${n}</span>`
      ).join('');

      const prescMembro = [
        ...p.critico_0_15.filter(x => x.responsavel === resp.nome).map(x => ({...x, tipo:'critico'})),
        ...p.urgente_16_30.filter(x => x.responsavel === resp.nome).map(x => ({...x, tipo:'urgente'})),
      ];

      const alertasHTML = prescMembro.map(x => `
        <div class="alerta-presc ${x.tipo}">
          <span>${x.tipo === 'prescrito' ? '🟣' : x.tipo === 'critico' ? '🔴' : '⚠️'} ${x.cliente}</span>
          <span>${x.tipo === 'prescrito' ? Math.abs(x.dias)+'d atrás' : x.dias+'d'}</span>
        </div>`).join('');

      const top5 = (resp.top5_atrasados || []).map(p => `
        <div class="atrasado-item">
          <div class="atrasado-dias">${p.dias_na_fase}d</div>
          <div class="atrasado-info">
            <div class="atrasado-cliente">${p.cliente}</div>
            <div class="atrasado-etapa">${p.etapa}</div>
          </div>
        </div>`).join('');

      return `
      <div class="membro-card">
        <div class="membro-header">
          ${foto ? `<img src="${foto}" class="membro-foto" onerror="this.style.display='none'">` : ''}
          <div>
            <div class="membro-nome">${resp.nome}</div>
            <div class="membro-total">${resp.total} processo${resp.total !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="membro-body">
          <div class="fases-row">${fases}</div>
          ${alertasHTML ? `<div class="membro-alertas">${alertasHTML}</div>` : ''}
          ${top5 ? `<div class="atrasados-title">⏱ Top 5 — mais tempo na fase atual</div>${top5}` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>
  `;

  document.getElementById('ts').textContent = 'Última atualização: ' + new Date().toLocaleString('pt-BR');
}

const now = new Date();
document.getElementById('hdate').innerHTML =
  now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) +
  '<br>' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

carregarDados();
setInterval(atualizarContador, 1000);
</script>
</body>
</html>
